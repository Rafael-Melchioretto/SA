<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotas - Pampa Serra</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="css/rotas.css">
</head>

<body>

  
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-4">

    <a class="navbar-brand d-flex align-items-center gap-3" href="#">
      <img src="img/logo.png" alt="Logo" class="logo">
    </a>

    <div class="mx-auto search-container">
      <div class="input-group">
        <input type="text" class="form-control" id="searchInput" placeholder="Rotas">
        <button class="btn btn-light" id="searchBtn">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>

  </nav>

   <div class="container-fluid mt-4">

   
    <div class="row justify-content-center g-4">

      <!-- ALERTAS -->
      <div class="col-lg-3">
        <div class="info-card text-center">

          <div class="alert-line danger">
            Atenção Máxima -
            <i class="bi bi-exclamation-triangle-fill"></i>
          </div>

          <div class="alert-line warning">
            Atenção -
            <i class="bi bi-exclamation-triangle-fill"></i>
          </div>

          <div class="alert-line success">
            Esperado -
            <i class="bi bi-exclamation-triangle-fill"></i>
          </div>

        </div>
      </div>

    
      <div class="col-lg-2">
        <div class="info-card text-center">
          <h2>Normal:</h2>

          <p>30-40 Km/h</p>
          <p>Consumo:</p>
          <p>3-5 L/km</p>
        </div>
      </div>
