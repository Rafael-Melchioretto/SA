<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pampa Serra </title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <div id="card-login">

    <div id="lado-esquerdo">
      <img src="assets/img/logo.png" id="logo" alt="Logo Pampa Serra">
    </div>

    <div id="lado-direito">
      <div id="form-area">

        <h2 id="titulo">Cadastro</h2>

        <form id="formLogin">

          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-control">
          </div>

<div class="mb-3">
            <label class="form-label" for="Registro">Registro</label>
            <input type="Registro" id="Registro" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label" for="senha">Senha</label>
            <input type="password" id="senha" class="form-control">
          </div>

<div class="mb-3">
            <label class="form-label" for="Confirme sua senha">Confirme sua senha</label>
            <input type="password" id="Confirme sua senha" class="form-control">
          </div>

          <button type="submit" id="btn-entrar">Entrar</button>

        </form>

      </div>
    </div>

  </div>

 
  <script src="script.js"></script>

</body>
</html>
